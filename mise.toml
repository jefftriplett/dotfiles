# mise dotfiles config — mirrors the homesick castle (home/) one-for-one.
# Lives at the castle ROOT (NOT under home/), so homesick never links it.
# Run from this directory:  mise dotfiles apply --dry-run
#
# Coexists with homesick: targets are identical, so apply is idempotent.
# 'symlink-each' entries mirror your .homesick_subdir (descend & link contents).

[settings]
dotfiles.root = "~/.homesick/repos/dotfiles/home"
dotfiles.default_mode = "symlink"

[dotfiles]
# --- whole-entry symlinks (top level of home/) ---
"~/.actrc" = {}
"~/.asdf" = {}
"~/.bash_aliases" = {}
"~/.bash_exports" = {}
"~/.bash_functions" = {}
"~/.bash_linux" = {}
