# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'

# ----------------------------
# Dracula Theme Settings
# ----------------------------
# Right side is overridden below (after TPM) to show hostname only via ~/bin/tmux-host.
set -g @dracula-plugins ""
set -g @dracula-show-left-icon session
set -g @dracula-day-month false
set -g @dracula-military-time false

# ----------------------------
# General Settings
# ----------------------------
# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Clipboard support (uses system clipboard via OSC 52)
set -g set-clipboard on

# Mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Reduce escape delay (eliminates Esc lag in Neovim/Vim)
set -sg escape-time 0

# Keep focus events working for terminal editors
set -g focus-events on

# Keep another session selected when destroying the current one
set -g detach-on-destroy off

# Keep sessions alive when no clients attached
set -g destroy-unattached off

# Enable activity alerts (visual notification disabled to reduce noise)
setw -g monitor-activity on
set -g visual-activity off

# ----------------------------
# Key Bindings
# ----------------------------
# Use default prefix Ctrl-b
set -g prefix C-b
bind C-b send-prefix

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Open new windows in the current pane's directory
bind c new-window -c "#{pane_current_path}"

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config with prefix-r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Clear screen and scrollback with prefix + Ctrl-k
bind C-k send-keys C-l \; clear-history

# Vim-style copy mode
# Copy via OSC 52 (set-clipboard on). Portable across macOS/Linux and over ssh;
# avoids hardcoding pbcopy, which fails on remote hosts. Note: mosh 1.4.0 does
# not forward OSC 52 — use the terminal's native modifier-drag to copy there.
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Mouse drag selection copies to system clipboard (via OSC 52)
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Trackpad/wheel routing: forward to apps that request mouse (vim/less/htop);
# in a normal shell pane send Up/Down for shell-history nav instead of
# jumping into copy-mode. Use Shift+scroll to reach the terminal emulator's
# own buffer. (Copy-mode panes resolve wheel events in the copy-mode key
# table, so they never hit these root bindings.)
bind -T root WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "send-keys -N 3 Up"
bind -T root WheelDownPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "send-keys -N 3 Down"

# Disable right-click context menu
unbind -n MouseDown3Pane
unbind -n MouseDown3Status
unbind -n MouseDown3StatusLeft
unbind -n MouseDown3StatusRight

# ----------------------------
# Initialize TPM (keep at bottom)
# ----------------------------
run '~/.tmux/plugins/tpm/tpm'

# Hostname-only right status (SSH-aware via ~/bin/tmux-host). Must come after
# TPM so it overrides whatever Dracula sets for status-right.
set-option -g status-right "#[bg=#50fa7b,fg=#282a36,bold] #(~/bin/tmux-host) "
